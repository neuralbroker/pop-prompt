<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
  <title>PopPrompt</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header class="sidebar-header">
        <div class="brand">
          <svg class="logo" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 7 4 4 20 4 20 7"></polyline>
            <line x1="9" y1="20" x2="15" y2="20"></line>
            <line x1="12" y1="4" x2="12" y2="20"></line>
          </svg>
          <h1>PopPrompt</h1>
        </div>
        <div class="header-actions">
          <button id="btn-theme" class="btn-icon" title="Toggle theme">
            <svg id="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg id="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
          <button id="btn-new" class="btn-icon" title="New Prompt (Ctrl+N)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </button>
        </div>
      </header>
      <div class="search-bar">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search" placeholder="Search prompts..." autocomplete="off">
        <button id="btn-clear-search" class="btn-clear" title="Clear search">&times;</button>
      </div>
      <div id="prompt-list" class="prompt-list"></div>
      <footer class="sidebar-footer">
        <span id="prompt-count">No prompts yet</span>
      </footer>
    </aside>

    <main id="main">
      <div id="empty-state" class="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 7 4 4 20 4 20 7"></polyline>
          <line x1="9" y1="20" x2="15" y2="20"></line>
          <line x1="12" y1="4" x2="12" y2="20"></line>
        </svg>
        <h2>No prompt selected</h2>
        <p>Select a prompt from the sidebar or create a new one</p>
        <button id="btn-new-empty" class="btn-primary">Create New Prompt</button>
      </div>

      <div id="editor" class="editor hidden">
        <div class="editor-header">
          <input
            type="text"
            id="prompt-title"
            class="title-input"
            placeholder="Prompt name..."
            autocomplete="off"
            spellcheck="false"
          >
          <div class="tags-row">
            <svg class="tag-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
              <line x1="7" y1="7" x2="7.01" y2="7"></line>
            </svg>
            <input
              type="text"
              id="prompt-tags"
              class="tags-input"
              placeholder="Add tags (comma separated)..."
              autocomplete="off"
              spellcheck="false"
            >
          </div>
        </div>

        <textarea
          id="prompt-content"
          class="content-area"
          placeholder="Paste or type your prompt here..."
          spellcheck="false"
        ></textarea>

        <div class="editor-toolbar">
          <div class="toolbar-left">
            <span id="char-count" class="char-count">0 characters</span>
            <span id="save-indicator" class="save-indicator saved">Saved</span>
          </div>
          <div class="toolbar-right">
            <button id="btn-favorite" class="btn-tool" title="Toggle favorite">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
              </svg>
            </button>
            <button id="btn-copy" class="btn-tool" title="Copy to clipboard (Ctrl+Shift+C)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
            <button id="btn-delete" class="btn-tool btn-danger" title="Delete prompt (Delete)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <div id="confirm-dialog" class="confirm-overlay hidden">
    <div class="confirm-box">
      <h3>Delete prompt?</h3>
      <p id="confirm-message">Are you sure you want to delete this prompt? This cannot be undone.</p>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="btn-secondary">Cancel</button>
        <button id="confirm-delete" class="btn-danger-solid">Delete</button>
      </div>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
